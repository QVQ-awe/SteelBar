# 数据集路径
path: F:/programing/SteelBar/datasets/rebar  # 数据集根目录
train: images/train  # 训练集图片路径
val: images/val      # 验证集图片路径
test: images/test    # 测试集图片路径

nc: 1  # 类别数（根据你的钢筋检测任务修改，比如改为1）
